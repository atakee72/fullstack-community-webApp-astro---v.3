name: Sync Schillerkiez Stats
on:
  schedule:
    - cron: '0 8 1 3 *' # March 1 → imports Dec 31 data (h2)
    - cron: '0 8 1 9 *' # September 1 → imports Jun 30 data (h1)
  workflow_dispatch:
    inputs:
      xlsx_url:
        description: 'AfS XLSX URL (leave empty for secret)'
        required: false
      period:
        description: 'AfS period, e.g. 2025h2'
        required: false
      mss_xlsx_url:
        description: 'MSS XLSX URL (leave empty for secret)'
        required: false
      mss_period:
        description: 'MSS period, e.g. 2023'
        required: false
      mss_sdi_url:
        description: 'MSS SDI XLSX URL (leave empty for secret)'
        required: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx scripts/sync-stats.ts
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          STATS_XLSX_URL: ${{ inputs.xlsx_url || secrets.STATS_XLSX_URL }}
          STATS_PERIOD: ${{ inputs.period || secrets.STATS_PERIOD }}
          MSS_XLSX_URL: ${{ inputs.mss_xlsx_url || secrets.MSS_XLSX_URL }}
          MSS_PERIOD: ${{ inputs.mss_period || secrets.MSS_PERIOD }}
          MSS_SDI_URL: ${{ inputs.mss_sdi_url || secrets.MSS_SDI_URL }}
